name: AutoPurple CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install bandit safety
      - name: SAST Scan
        run: bandit -r backend/app || true
      - name: SCA Scan
        run: safety check -r backend/requirements.txt || true
